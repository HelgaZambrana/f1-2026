name: Fetch F1 Race Data

on:
  schedule:
    - cron: '0 21 * * 0' # domingos a las 18hs Argentina (UTC-3)
    - cron: '0 12 * * 3'  # miércoles al mediodía para mantener Supabase activo
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create cache directory
        run: mkdir -p cache/

      - name: Keep Supabase alive
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "from supabase import create_client; import os; c = create_client(os.getenv('SUPABASE_URL'), os.getenv('SUPABASE_KEY')); c.table('races').select('race_id').limit(1).execute(); print('Supabase alive')"
          sleep 30

      - name: Run ingestion script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ingestion/fetch_fastf1.py